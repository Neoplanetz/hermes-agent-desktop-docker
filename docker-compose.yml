services:
  hermes-desktop:
    build: { context: ., dockerfile: Dockerfile }
    image: hermes-desktop:latest
    container_name: hermes-desktop
    environment:
      - HERMES_USER=${HERMES_USER:-hermes}
      - HERMES_PASSWORD=${HERMES_PASSWORD:-hermes123}
    ports:
      - "127.0.0.1:6080:6080"
      - "127.0.0.1:5901:5901"
      # RDP: xrdp listens on 3389 inside the container; published to host 3390
      # because host 3389 may already be taken by a local RDP service
      # (e.g. gnome-remote-desktop). Connect RDP clients to localhost:3390.
      - "127.0.0.1:3390:3389"
    volumes:
      - hermes-home:/home/${HERMES_USER:-hermes}
    shm_size: "2gb"
    security_opt: [ "seccomp=unconfined" ]
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:6080/vnc.html >/dev/null && su - \"${HERMES_USER:-hermes}\" -c 'DISPLAY=:1 xdpyinfo >/dev/null 2>&1'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  hermes-home:
    name: hermes-home
